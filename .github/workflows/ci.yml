name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  gate:
    name: gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      # prisma generate 需要 DATABASE_URL 存在；CI 不连真实库，复用 .husky/pre-push 的 placeholder 策略
      DATABASE_URL: mysql://placeholder:placeholder@127.0.0.1:3306/saifute-wsm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # commitlint 需要完整历史以校验 PR 范围内的所有提交
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Cache bun + node_modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prisma generate
        run: bun run prisma:generate

      - name: Lint (biome — 存量违规暂不阻断，待全仓 format 后收紧)
        continue-on-error: true
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: File size audit (warn only — 存量 12 个文件 > 1000 行，待消化后收紧为阻断)
        run: bun run lint:src-lines

      - name: Unit tests
        run: bun run test

      - name: Commitlint (PR range)
        if: github.event_name == 'pull_request'
        run: |
          bunx commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}" \
            --verbose
